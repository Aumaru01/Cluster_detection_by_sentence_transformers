model:
  embedding_model_path: jinaai/jina-embeddings-v3-hf                                  ######### 1st Best results fast
  tokenizer_path: jinaai/jina-embeddings-v3-hf                                        ######### 1nd Best results fast
  # embedding_model_path: facebook/drama-large                                          ######### 2nd Best results
  # tokenizer_path: facebook/drama-large                                                ######### 2nd Best results
  # embedding_model_path: facebook/drama-1b                                             ######### 3rd Best results
  # tokenizer_path: facebook/drama-1b                                                   ######### 3rd Best results
  # embedding_model_path: facebook/drama-base                                           ######### Intermediate results
  # tokenizer_path: facebook/drama-base                                                 ######### Intermediate results
  # embedding_model_path: jinaai/jina-embeddings-v5-text-small                          ######### Intermediate results
  # tokenizer_path: jinaai/jina-embeddings-v5-text-small                                ######### Intermediate results
  # embedding_model_path: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2   ######### [Base] Intermediate results but fast
  # tokenizer_path: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2         ######### [Base] Intermediate
  max_token: 128
  use_gpu: true
  precision: auto          # auto | bf16 | fp16 | fp32 — auto picks bf16 on Ampere+, else fp16, CPU always fp32
  encode_batch_size: 16    # micro-batch size for encoding: lower → less peak VRAM, higher → faster throughput

clustering:
  threshold: 0.6   # default threshold for cosine similarity if request not provided threshold
  top_k: 5          # FAISS candidate neighbours retrieved per query
  max_clusters: 1000000

api:
  prefix: /api/v1
  host: 0.0.0.0
  port: 50000

logging:
  level: INFO          # DEBUG | INFO | WARNING | ERROR
  log_dir: logs        # directory to write log files
  max_bytes: 10485760  # 10 MB — rotate when file exceeds this size

debug: false          # if true, saves input and output of /clusters/assign to res