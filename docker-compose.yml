version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount your local config.yaml into the container
      - ./config.yaml:/app/config.yaml:ro
      # Persist the FAISS index + model weights between container restarts
      - ./data/model:/app/data/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Scale-out example (stateless mode, shared Redis or external store) ──
  # Uncomment and adjust when you need multiple replicas behind a load balancer.
  # Each replica holds its OWN in-memory FAISS state, so only use this when
  # requests can be routed to any replica (e.g. each handles a separate topic shard).
  #
  # api_worker_2:
  #   build: .
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - ./config.yaml:/app/config.yaml:ro
  #     - ./data/model:/app/data/model

  # ── Nginx load-balancer (optional) ──────────────────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
